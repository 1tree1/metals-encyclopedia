<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>금속 백과사전 - Interactive Metals Encyclopedia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #0a0a0f;
            color: #e0e0e0;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background-color: #131320;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            background-color: #1a1a22;
            border: 1px solid #333;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 13px;
        }

        .search-input::placeholder {
            color: #666;
        }

        .search-input:focus {
            outline: none;
            border-color: #666;
            background-color: #1f1f2a;
        }

        .sidebar-content {
            overflow-y: auto;
            flex: 1;
            padding: 12px;
        }

        .accordion-group {
            margin-bottom: 8px;
        }

        .accordion-header {
            padding: 10px 12px;
            background-color: #1a1a22;
            border: 1px solid #222;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 13px;
            user-select: none;
            transition: background-color 0.2s;
        }

        .accordion-header:hover {
            background-color: #202028;
        }

        .accordion-header.active {
            color: #fff;
        }

        .accordion-arrow {
            display: inline-block;
            transition: transform 0.3s;
            font-size: 12px;
        }

        .accordion-header.active .accordion-arrow {
            transform: rotate(90deg);
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .accordion-content.active {
            max-height: 500px;
        }

        .metal-item {
            padding: 8px 12px;
            margin: 4px 0;
            background-color: #1a1a22;
            border-left: 3px solid #666;
            border-radius: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            transition: all 0.2s;
            user-select: none;
        }

        .metal-item:hover {
            background-color: #202028;
            transform: translateX(4px);
        }

        .metal-item.selected {
            background-color: #2a2a32;
            color: #fff;
        }

        .metal-symbol {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .metal-names {
            flex: 1;
            min-width: 0;
        }

        .metal-name-ko {
            font-weight: 600;
            color: #fff;
        }

        .metal-name-en {
            font-size: 10px;
            color: #999;
        }

        /* GLOBE CONTAINER */
        .globe-container {
            flex: 1;
            background-color: #0a0a0f;
            position: relative;
            overflow: hidden;
        }

        #globeViz {
            width: 100%;
            height: 100%;
            display: block;
        }

        .globe-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background-color: rgba(10, 10, 15, 0.8);
            border: 1px solid #333;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 12px;
            color: #999;
            backdrop-filter: blur(10px);
        }

        /* SIDE PANEL */
        .info-panel {
            width: 0;
            background-color: #131320;
            border-left: 1px solid #222;
            overflow-y: auto;
            transition: width 0.3s ease-out;
            position: relative;
        }

        .info-panel.open {
            width: 400px;
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            position: sticky;
            top: 0;
            background-color: #131320;
            z-index: 10;
        }

        .panel-close-btn {
            width: 24px;
            height: 24px;
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .panel-close-btn:hover {
            color: #fff;
        }

        .panel-title {
            flex: 1;
        }

        .metal-title-ko {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .metal-title-en {
            font-size: 12px;
            color: #999;
        }

        .metal-symbol-large {
            width: 50px;
            height: 50px;
            background-color: #1a1a22;
            border: 1px solid #333;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .metal-category-tag {
            display: inline-block;
            padding: 4px 8px;
            background-color: #2a2a32;
            border-radius: 3px;
            font-size: 11px;
            color: #999;
            margin-top: 8px;
        }

        .panel-content {
            padding: 20px;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #222;
        }

        .ore-info {
            background-color: #1a1a22;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
        }

        .ore-name {
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .ore-type {
            color: #999;
            font-size: 11px;
        }

        .locations-list {
            font-size: 12px;
        }

        .location-item {
            padding: 8px 0;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .location-item:last-child {
            border-bottom: none;
        }

        .location-name {
            font-weight: 500;
            color: #fff;
        }

        .location-country {
            color: #999;
            font-size: 11px;
        }

        .location-pct {
            color: #666;
            font-size: 11px;
            margin-left: 8px;
        }

        .properties-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .property-card {
            background-color: #1a1a22;
            padding: 10px;
            border-radius: 4px;
            border-left: 2px solid #3C3489;
        }

        .property-label {
            font-size: 10px;
            color: #999;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .property-value {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            word-break: break-word;
        }

        .bars-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .bar-item {
            font-size: 12px;
        }

        .bar-label {
            margin-bottom: 6px;
            color: #999;
            display: flex;
            justify-content: space-between;
        }

        .bar-label-name {
            font-weight: 500;
        }

        .bar-label-value {
            font-size: 11px;
            color: #666;
        }

        .bar-container {
            height: 6px;
            background-color: #1a1a22;
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3C3489, #534AB7);
            border-radius: 3px;
        }

        .process-flow {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 11px;
        }

        .process-step {
            background-color: #1a1a22;
            padding: 6px 10px;
            border-radius: 3px;
            color: #fff;
            white-space: nowrap;
        }

        .process-arrow {
            color: #666;
            font-weight: bold;
        }

        .carbon-gauge {
            background-color: #1a1a22;
            padding: 12px;
            border-radius: 4px;
        }

        .carbon-value {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .carbon-bar {
            height: 8px;
            background-color: #0a0a0f;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .carbon-fill {
            height: 100%;
            background-color: #4ade80;
            border-radius: 4px;
        }

        .carbon-label {
            font-size: 10px;
            color: #999;
        }

        .applications-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 11px;
        }

        .app-chip {
            background-color: #1a1a22;
            padding: 4px 8px;
            border-radius: 12px;
            color: #999;
            border: 1px solid #333;
        }

        .resources-info {
            font-size: 12px;
            background-color: #1a1a22;
            padding: 12px;
            border-radius: 4px;
        }

        .resource-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #222;
        }

        .resource-row:last-child {
            border-bottom: none;
        }

        .resource-label {
            color: #999;
            font-weight: 500;
        }

        .resource-value {
            color: #fff;
            text-align: right;
        }

        #resourceChart {
            max-height: 300px;
        }

        .story-section {
            background-color: #1a1a22;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.6;
            color: #ccc;
            max-height: 400px;
            overflow-y: auto;
        }

        .story-content {
            white-space: pre-wrap;
        }

        /* CATEGORY COLORS */
        .ferrous { --color: #3C3489; }
        .heavy { --color: #D85A30; }
        .light { --color: #0F6E56; }
        .precious { --color: #EF9F27; }
        .rare { --color: #534AB7; }
        .ree { --color: #1A8A7A; }
        .metalloid { --color: #888780; }

        .metal-item.ferrous { border-left-color: #3C3489; }
        .metal-item.heavy { border-left-color: #D85A30; }
        .metal-item.light { border-left-color: #0F6E56; }
        .metal-item.precious { border-left-color: #EF9F27; }
        .metal-item.rare { border-left-color: #534AB7; }
        .metal-item.ree { border-left-color: #1A8A7A; }
        .metal-item.metalloid { border-left-color: #888780; }

        .property-card.ferrous { border-left-color: #3C3489; }
        .property-card.heavy { border-left-color: #D85A30; }
        .property-card.light { border-left-color: #0F6E56; }
        .property-card.precious { border-left-color: #EF9F27; }
        .property-card.rare { border-left-color: #534AB7; }
        .property-card.ree { border-left-color: #1A8A7A; }
        .property-card.metalloid { border-left-color: #888780; }

        .bar-fill.ferrous { background: linear-gradient(90deg, #3C3489, #5a4dbd); }
        .bar-fill.heavy { background: linear-gradient(90deg, #D85A30, #ff7a51); }
        .bar-fill.light { background: linear-gradient(90deg, #0F6E56, #1a9a7a); }
        .bar-fill.precious { background: linear-gradient(90deg, #EF9F27, #ffc451); }
        .bar-fill.rare { background: linear-gradient(90deg, #534AB7, #7865d9); }
        .bar-fill.ree { background: linear-gradient(90deg, #1A8A7A, #2bb89a); }
        .bar-fill.metalloid { background: linear-gradient(90deg, #888780, #aaa89a); }

        /* Scrollbar styling */
        .sidebar-content::-webkit-scrollbar,
        .info-panel::-webkit-scrollbar,
        .story-section::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-content::-webkit-scrollbar-track,
        .info-panel::-webkit-scrollbar-track,
        .story-section::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-content::-webkit-scrollbar-thumb,
        .info-panel::-webkit-scrollbar-thumb,
        .story-section::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .sidebar-content::-webkit-scrollbar-thumb:hover,
        .info-panel::-webkit-scrollbar-thumb:hover,
        .story-section::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 6px 10px;
            border-radius: 3px;
            font-size: 11px;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
            border: 1px solid #333;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">금속 백과사전</div>
                <input type="text" class="search-input" id="searchInput" placeholder="금속 검색...">
            </div>
            <div class="sidebar-content" id="sidebarContent">
                <!-- Accordion groups will be populated here -->
            </div>
        </div>

        <!-- GLOBE -->
        <div class="globe-container">
            <div id="globeViz"></div>
            <div class="globe-info">
                <div>마우스: 회전 | 스크롤: 줌</div>
                <div style="margin-top: 4px; color: #666;">금속을 선택하면 산지가 표시됩니다</div>
            </div>
        </div>

        <!-- INFO PANEL -->
        <div class="info-panel" id="infoPanel">
            <div class="panel-header">
                <div class="panel-title">
                    <div class="metal-title-ko" id="panelMetalNameKo"></div>
                    <div class="metal-title-en" id="panelMetalNameEn"></div>
                    <div class="metal-category-tag" id="panelMetalCategory"></div>
                </div>
                <div class="metal-symbol-large" id="panelMetalSymbol"></div>
                <button class="panel-close-btn" id="panelCloseBtn">✕</button>
            </div>
            <div class="panel-content">
                <!-- Ore Information -->
                <div class="section">
                    <div class="section-title">원석 정보</div>
                    <div class="ore-info">
                        <div class="ore-name" id="oreNameKo"></div>
                        <div class="ore-type" id="oreType"></div>
                    </div>
                </div>

                <!-- Mining Locations -->
                <div class="section">
                    <div class="section-title">산지 정보 (주요 생산국)</div>
                    <div class="locations-list" id="locationsList"></div>
                </div>

                <!-- Properties -->
                <div class="section">
                    <div class="section-title">물질 특성</div>
                    <div class="properties-grid" id="propertiesGrid"></div>
                </div>

                <!-- Comparative Bars -->
                <div class="section">
                    <div class="section-title">상대 비교</div>
                    <div class="bars-grid" id="barsGrid"></div>
                </div>

                <!-- Processing -->
                <div class="section">
                    <div class="section-title">가공 프로세스</div>
                    <div class="process-flow" id="processList"></div>
                </div>

                <!-- Environmental -->
                <div class="section">
                    <div class="section-title">환경 정보 (탄소발자국)</div>
                    <div class="carbon-gauge" id="carbonGauge"></div>
                </div>

                <!-- Applications -->
                <div class="section">
                    <div class="section-title">활용 정보</div>
                    <div class="applications-chips" id="appsList"></div>
                </div>

                <!-- Resources Data -->
                <div class="section">
                    <div class="section-title">자원 데이터</div>
                    <div class="resources-info" id="resourcesInfo"></div>
                    <canvas id="resourceChart" style="margin-top: 16px;"></canvas>
                </div>

                <!-- Story -->
                <div class="section">
                    <div class="section-title">스토리</div>
                    <div class="story-section" id="storySection">
                        <div class="story-content">스토리 로딩 중...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="stories.js"></script>

                carbon: 18.0,
                applications: ['고온 영구자석(Dy첨가)', '원자로 제어봉', '방사선 흡수체'],
                resources: {reserves: 'REE 매장량 내', mined: '~1.5만 톤', price: '$300-500/kg'}
            },
            {

                locations: [
                    {name: '중국', country: '중국', lat: 42.0, lng: 110.0, pct: 83},
                    {name: '미국', country: '미국', lat: 35.0, lng: -115.0, pct: 5},
                    {name: '호주', country: '호주', lat: -30.0, lng: 134.0, pct: 4}
                ],
                properties: {
                    density: '6.77 g/cm³', meltingPoint: '798°C', tensileStrength: '~200 MPa',
                    conductivity: '1.4 MS/m', hardness: '90 HV', crystalStructure: 'FCC'
                },
                bars: {strength: 30, corrosionRes: 15, conductivity: 4, lightweight: 24, heatRes: 35},
                process: ['REE 광석 채광', '산침출', '용매추출(분리)', '옥살산 침전', '하소→CeO₂'],
                carbon: 10.0,
                applications: ['자동차 촉매', '유리 연마제', '연료전지', '자외선 차단'],
                resources: {reserves: 'REE 내 최다(~50%)', mined: '~50만 톤', price: '$5-8/kg(산화물)'}
            },
            {
                id: 'la', name: '란타넘', nameEn: 'Lanthanum', symbol: 'La', category: 'ree',
                ore: {name: '바스트네사이트(La 35%)', type: '탄산염광물'},
                locations: [
                    {name: '중국', country: '중국', lat: 42.0, lng: 110.0, pct: 83},
                    {name: '미국', country: '미국', lat: 35.0, lng: -115.0, pct: 5},
                    {name: '호주', country: '호주', lat: -30.0, lng: 134.0, pct: 4}
                ],
                properties: {
                    density: '6.15 g/cm³', meltingPoint: '920°C', tensileStrength: '~180 MPa',
                    conductivity: '1.5 MS/m', hardness: '110 HV', crystalStructure: 'HCP'
                },
                bars: {strength: 25, corrosionRes: 15, conductivity: 4, lightweight: 30, heatRes: 40},
                process: ['REE 광석 채광', '산침출', '용매추출', '옥살산 침전', '하소→La₂O₃'],
                carbon: 10.0,
                applications: ['촉매(자동차 배기)', 'NiMH 배터리', '연마 화합물', '광학 유리'],
                resources: {reserves: 'REE 매장량 내', mined: '~30만 톤', price: '$5-8/kg(산화물)'}
            },
            {
                id: 'pr', name: '프라세오디뮴', nameEn: 'Praseodymium', symbol: 'Pr', category: 'ree',
                ore: {name: '바스트네사이트/모나자이트', type: '탄산염/인산염'},
                locations: [
                    {name: '중국', country: '중국', lat: 42.0, lng: 110.0, pct: 83},
                    {name: '미국', country: '미국', lat: 35.0, lng: -115.0, pct: 5},
                    {name: '호주', country: '호주', lat: -30.0, lng: 134.0, pct: 4}
                ],
                properties: {
                    density: '6.64 g/cm³', meltingPoint: '931°C', tensileStrength: '~250 MPa',
                    conductivity: '1.4 MS/m', hardness: '130 HV', crystalStructure: 'HCP'
                },
                bars: {strength: 35, corrosionRes: 15, conductivity: 4, lightweight: 25, heatRes: 40},
                process: ['REE 광석 채광', '산침출', '용매추출(분리)', '옥살산 침전', '하소→Pr₆O₁₁'],
                carbon: 12.0,
                applications: ['영구자석(Pr-Fe-B)', '촉매', '광학소재', '착색제(세라믹 녹색)'],
                resources: {reserves: 'REE 매장량 내', mined: '~2만 톤', price: '$80-100/kg(산화물)'}
            },
            {
                id: 'si', name: '규소', nameEn: 'Silicon', symbol: 'Si', category: 'metalloid',
                ore: {name: '석영(SiO₂)/규사', type: '산화광물'},
                locations: [
                    {name: '중국', country: '중국', lat: 28.0, lng: 106.0, pct: 70},
                    {name: '러시아', country: '러시아', lat: 56.0, lng: 44.0, pct: 5},
                    {name: '노르웨이', country: '노르웨이', lat: 60.0, lng: 8.0, pct: 5}
                ],
                properties: {
                    density: '2.33 g/cm³', meltingPoint: '1,414°C', tensileStrength: '~100 MPa(취성)',
                    conductivity: '10⁻³ MS/m(진성반도체)', hardness: '1,150 HV', crystalStructure: '다이아몬드 입방'
                },
                bars: {strength: 40, corrosionRes: 80, conductivity: 1, lightweight: 90, heatRes: 65},
                process: ['석영/규사 채광', '세척·분급', '전기로 환원(1,800°C+)', '야금급 Si 생산', 'SiHCl₃ 전환(반도체급)', '초크랄스키법 단결정 성장'],
                carbon: 5.0,
                applications: ['반도체/IC(99.9999999%)', '태양전지(25%)', '알루미늄 합금(60%)', '실리콘'],
                resources: {reserves: '사실상 무한(석영 편재)', mined: '~100억 톤', price: '$3-5/kg(야금급) | $100-200/kg(반도체급)'}
            }
        ];

        // CATEGORY TRANSLATIONS
        const CATEGORY_NAMES = {
            ferrous: '철금속',
            heavy: '비철 - 중금속',
            light: '비철 - 경금속',
            precious: '비철 - 귀금속',
            rare: '희유금속/전략금속',
            ree: '희토류 (REE)',
            metalloid: '준금속'
        };

        // GLOBE SETUP
        let globe, selectedMetal = null;
        let chart;

        function initGlobe() {
            const container = document.getElementById('globeViz');

            globe = Globe()(container)
                .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
                .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
                .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
                .showAtmosphere(true)
                .atmosphereColor('#3a228a')
                .atmosphereAltitude(0.25)
                .pointsData([])
                .pointLat('lat')
                .pointLng('lng')
                .pointColor('color')
                .pointAltitude(0.06)
                .pointRadius(0.4)
                .pointLabel(d => `<div style="background:rgba(10,10,15,0.9);padding:8px 12px;border-radius:6px;border:1px solid #444;font-size:12px;color:#fff;font-family:-apple-system,sans-serif;">
                    <div style="font-weight:700;">${d.name}</div>
                    <div style="color:#999;font-size:11px;">${d.country} · ${d.pct}%</div>
                </div>`)
                .labelsData([])
                .labelLat('lat')
                .labelLng('lng')
                .labelText('name')
                .labelSize(0.6)
                .labelDotRadius(0.3)
                .labelColor('color')
                .labelResolution(2)
                .labelAltitude(0.01);

            // Set initial view point (shows Asia/Europe)
            globe.pointOfView({ lat: 30, lng: 50, altitude: 2.2 });

            // Handle resize
            window.addEventListener('resize', () => {
                globe.width(container.clientWidth);
                globe.height(container.clientHeight);
            });
        }

        function addMinePins(locations, categoryColor) {
            const pointsData = locations.map(loc => ({
                lat: loc.lat,
                lng: loc.lng,
                name: loc.name,
                country: loc.country,
                pct: loc.pct,
                color: categoryColor
            }));

            const labelsData = locations.map(loc => ({
                lat: loc.lat,
                lng: loc.lng,
                name: `${loc.name} (${loc.pct}%)`,
                color: categoryColor
            }));

            globe.pointsData(pointsData);
            globe.labelsData(labelsData);

            // Animate to first location
            if (locations.length > 0) {
                globe.pointOfView({ lat: locations[0].lat, lng: locations[0].lng, altitude: 2.0 }, 1000);
            }
        }


        // UI FUNCTIONS
        function buildSidebar() {
            const sidebarContent = document.getElementById('sidebarContent');
            sidebarContent.innerHTML = '';

            const categoryOrder = ['ferrous', 'heavy', 'light', 'precious', 'rare', 'ree', 'metalloid'];

            categoryOrder.forEach(catId => {
                const metals = METALS_DATA.filter(m => m.category === catId);
                if (metals.length === 0) return;

                const group = document.createElement('div');
                group.className = 'accordion-group';

                const header = document.createElement('div');
                header.className = 'accordion-header active';
                header.innerHTML = `<span class="accordion-arrow">▶</span> ${CATEGORY_NAMES[catId]}`;

                const content = document.createElement('div');
                content.className = 'accordion-content active';

                metals.forEach(metal => {
                    const item = document.createElement('button');
                    item.className = `metal-item ${metal.category}`;
                    item.dataset.metalId = metal.id;
                    item.innerHTML = `
                        <div class="metal-symbol">${metal.symbol}</div>
                        <div class="metal-names">
                            <div class="metal-name-ko">${metal.name}</div>
                            <div class="metal-name-en">${metal.nameEn}</div>
                        </div>
                    `;
                    item.addEventListener('click', () => selectMetal(metal));
                    content.appendChild(item);
                });

                header.addEventListener('click', () => {
                    header.classList.toggle('active');
                    content.classList.toggle('active');
                    header.querySelector('.accordion-arrow').style.transform =
                        header.classList.contains('active') ? 'rotate(90deg)' : 'rotate(0deg)';
                });

                group.appendChild(header);
                group.appendChild(content);
                sidebarContent.appendChild(group);
            });
        }

        function selectMetal(metal) {
            selectedMetal = metal;

            // Update sidebar selection
            document.querySelectorAll('.metal-item').forEach(item => {
                item.classList.remove('selected');
            });
            document.querySelector(`[data-metal-id="${metal.id}"]`).classList.add('selected');

            // Show panel
            const panel = document.getElementById('infoPanel');
            panel.className = 'info-panel open ' + metal.category;

            // Update panel header
            document.getElementById('panelMetalNameKo').textContent = metal.name;
            document.getElementById('panelMetalNameEn').textContent = metal.nameEn;
            document.getElementById('panelMetalSymbol').textContent = metal.symbol;
            document.getElementById('panelMetalCategory').textContent = CATEGORY_NAMES[metal.category];

            // Ore info
            document.getElementById('oreNameKo').textContent = metal.ore.name;
            document.getElementById('oreType').textContent = metal.ore.type;

            // Locations
            const locationsList = document.getElementById('locationsList');
            locationsList.innerHTML = metal.locations.map(loc => `
                <div class="location-item">
                    <div>
                        <div class="location-name">${loc.name}</div>
                        <div class="location-country">${loc.country}</div>
                    </div>
                    <div class="location-pct">${loc.pct}%</div>
                </div>
            `).join('');

            // Properties
            const propertiesGrid = document.getElementById('propertiesGrid');
            const props = [
                { label: '밀도', value: metal.properties.density },
                { label: '용융점', value: metal.properties.meltingPoint },
                { label: '인장강도', value: metal.properties.tensileStrength },
                { label: '전도율', value: metal.properties.conductivity },
                { label: '경도', value: metal.properties.hardness },
                { label: '결정구조', value: metal.properties.crystalStructure }
            ];
            propertiesGrid.innerHTML = props.map(p => `
                <div class="property-card ${metal.category}">
                    <div class="property-label">${p.label}</div>
                    <div class="property-value">${p.value}</div>
                </div>
            `).join('');

            // Comparative bars
            const barsGrid = document.getElementById('barsGrid');
            const barLabels = ['강도', '내식성', '전도성', '경량성', '내열성'];
            const barKeys = ['strength', 'corrosionRes', 'conductivity', 'lightweight', 'heatRes'];
            barsGrid.innerHTML = barLabels.map((label, idx) => {
                const value = metal.bars[barKeys[idx]];
                return `
                    <div class="bar-item">
                        <div class="bar-label">
                            <span class="bar-label-name">${label}</span>
                            <span class="bar-label-value">${value}</span>
                        </div>
                        <div class="bar-container">
                            <div class="bar-fill ${metal.category}" style="width: ${value}%"></div>
                        </div>
                    </div>
                `;
            }).join('');

            // Process
            const processList = document.getElementById('processList');
            processList.innerHTML = metal.process.map((step, idx) => `
                <div class="process-step">${step}</div>
                ${idx < metal.process.length - 1 ? '<div class="process-arrow">→</div>' : ''}
            `).join('');

            // Carbon
            const carbonGauge = document.getElementById('carbonGauge');
            let carbonColor = '#4ade80';
            if (metal.carbon > 5) carbonColor = '#fbbf24';
            if (metal.carbon > 20) carbonColor = '#f87171';
            const carbonPercent = Math.min(100, (metal.carbon / 50) * 100);
            carbonGauge.innerHTML = `
                <div class="carbon-value">${metal.carbon} kg CO₂/kg</div>
                <div class="carbon-bar">
                    <div class="carbon-fill" style="width: ${carbonPercent}%; background-color: ${carbonColor};"></div>
                </div>
                <div class="carbon-label">${metal.carbon > 20 ? '높음' : metal.carbon > 5 ? '중간' : '낮음'}</div>
            `;

            // Applications
            const appsList = document.getElementById('appsList');
            appsList.innerHTML = metal.applications.map(app => `
                <div class="app-chip">${app}</div>
            `).join('');

            // Resources
            const resourcesInfo = document.getElementById('resourcesInfo');
            resourcesInfo.innerHTML = `
                <div class="resource-row">
                    <span class="resource-label">매장량</span>
                    <span class="resource-value">${metal.resources.reserves}</span>
                </div>
                <div class="resource-row">
                    <span class="resource-label">채광량</span>
                    <span class="resource-value">${metal.resources.mined}</span>
                </div>
                <div class="resource-row">
                    <span class="resource-label">가격</span>
                    <span class="resource-value">${metal.resources.price}</span>
                </div>
            `;

            // Chart
            const ctx = document.getElementById('resourceChart');
            if (chart) chart.destroy();

            const reserves = parseFloat(metal.resources.reserves);
            const mined = parseFloat(metal.resources.mined);

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['매장량', '채광량'],
                    datasets: [{
                        label: '양 (톤)',
                        data: [reserves, mined],
                        backgroundColor: ['rgba(60, 52, 137, 0.7)', 'rgba(80, 80, 100, 0.7)'],
                        borderColor: ['#3C3489', '#505064'],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            ticks: { color: '#999' },
                            grid: { color: '#222' }
                        },
                        x: {
                            ticks: { color: '#999' },
                            grid: { display: false }
                        }
                    }
                }
            });

            // Story
            const storySection = document.getElementById('storySection');
            if (typeof METAL_STORIES !== 'undefined' && METAL_STORIES[metal.id]) {
                storySection.innerHTML = METAL_STORIES[metal.id].map(story => `
                    <div class="story-card" style="background:#1a1a22;padding:14px;border-radius:6px;margin-bottom:10px;border-left:3px solid var(--color, #534AB7);">
                        <div style="font-weight:700;color:#fff;margin-bottom:8px;font-size:13px;">${story.title}</div>
                        <div style="font-size:12px;color:#bbb;line-height:1.7;">${story.content}</div>
                    </div>
                `).join('');
            } else {
                storySection.innerHTML = '<div class="story-content" style="color:#666;font-size:12px;">이 금속의 스토리 콘텐츠를 준비 중입니다.</div>';
            }

            // Add mine pins to globe
            const categoryColors = {
                ferrous: '#3C3489', heavy: '#D85A30', light: '#0F6E56',
                precious: '#EF9F27', rare: '#534AB7', ree: '#1A8A7A', metalloid: '#888780'
            };
            addMinePins(metal.locations, categoryColors[metal.category] || '#ffffff');
        }

        function closePanel() {
            document.getElementById('infoPanel').classList.remove('open');
            document.querySelectorAll('.metal-item').forEach(item => {
                item.classList.remove('selected');
            });
            globe.pointsData([]);
            globe.labelsData([]);
            selectedMetal = null;
        }

        function filterMetals(searchTerm) {
            const term = searchTerm.toLowerCase();
            document.querySelectorAll('.metal-item').forEach(item => {
                const metal = METALS_DATA.find(m => m.id === item.dataset.metalId);
                const matches = metal.name.includes(term) ||
                               metal.nameEn.toLowerCase().includes(term) ||
                               metal.symbol.toLowerCase().includes(term);
                item.style.display = matches ? 'flex' : 'none';
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initGlobe();
            buildSidebar();

            document.getElementById('searchInput').addEventListener('input', (e) => {
                filterMetals(e.target.value);
            });

            document.getElementById('panelCloseBtn').addEventListener('click', closePanel);
        });
    </script>
</body>
