<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>금속 백과사전 - Interactive Metals Encyclopedia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #f5f5f8;
            color: #333333;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background-color: #ffffff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            background-color: #f0f0f5;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            color: #333333;
            font-size: 13px;
        }

        .search-input::placeholder {
            color: #999999;
        }

        .search-input:focus {
            outline: none;
            border-color: #999999;
            background-color: #e8e8f0;
        }

        .sidebar-content {
            overflow-y: auto;
            flex: 1;
            padding: 12px;
        }

        .accordion-group {
            margin-bottom: 8px;
        }

        .accordion-header {
            padding: 10px 12px;
            background-color: #f0f0f5;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 13px;
            user-select: none;
            transition: background-color 0.2s;
        }

        .accordion-header:hover {
            background-color: #e5e5ec;
        }

        .accordion-header.active {
            color: #1a1a2e;
        }

        .accordion-arrow {
            display: inline-block;
            transition: transform 0.3s;
            font-size: 12px;
        }

        .accordion-header.active .accordion-arrow {
            transform: rotate(90deg);
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .accordion-content.active {
            max-height: 500px;
        }

        .metal-item {
            padding: 8px 12px;
            margin: 4px 0;
            background-color: #f0f0f5;
            border-left: 3px solid #ccc;
            border-radius: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            transition: all 0.2s;
            user-select: none;
        }

        .metal-item:hover {
            background-color: #e5e5ec;
            transform: translateX(4px);
        }

        .metal-item.selected {
            background-color: #e0e0ea;
            color: #1a1a2e;
        }

        .metal-symbol {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background-color: rgba(0, 0, 0, 0.08);
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            color: #1a1a2e;
            flex-shrink: 0;
        }

        .metal-names {
            flex: 1;
            min-width: 0;
        }

        .metal-name-ko {
            font-weight: 600;
            color: #1a1a2e;
        }

        .metal-name-en {
            font-size: 10px;
            color: #666666;
        }

        /* GLOBE CONTAINER */
        .globe-container {
            flex: 1;
            background-color: #f5f5f8;
            position: relative;
            overflow: hidden;
        }

        #globeViz {
            width: 100%;
            height: 100%;
            display: block;
        }

        .globe-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid #e0e0e0;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 12px;
            color: #666666;
            backdrop-filter: blur(10px);
        }

        /* SIDE PANEL */
        .info-panel {
            width: 0;
            background-color: #ffffff;
            border-left: 1px solid #e0e0e0;
            overflow-y: auto;
            transition: width 0.3s ease-out;
            position: relative;
        }

        .info-panel.open {
            width: 400px;
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            position: sticky;
            top: 0;
            background-color: #ffffff;
            z-index: 10;
        }

        .panel-close-btn {
            width: 24px;
            height: 24px;
            background: none;
            border: none;
            color: #666666;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .panel-close-btn:hover {
            color: #1a1a2e;
        }

        .panel-title {
            flex: 1;
        }

        .metal-title-ko {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .metal-title-en {
            font-size: 12px;
            color: #666666;
        }

        .metal-symbol-large {
            width: 50px;
            height: 50px;
            background-color: #f0f0f5;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            flex-shrink: 0;
        }

        .metal-category-tag {
            display: inline-block;
            padding: 4px 8px;
            background-color: #e0e0ea;
            border-radius: 3px;
            font-size: 11px;
            color: #666666;
            margin-top: 8px;
        }

        .panel-content {
            padding: 20px;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #1a1a2e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .ore-info {
            background-color: #f0f0f5;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
        }

        .ore-name {
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .ore-type {
            color: #666666;
            font-size: 11px;
        }

        .locations-list {
            font-size: 12px;
        }

        .location-item {
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .location-item:last-child {
            border-bottom: none;
        }

        .location-name {
            font-weight: 500;
            color: #1a1a2e;
        }

        .location-country {
            color: #666666;
            font-size: 11px;
        }

        .location-pct {
            color: #999999;
            font-size: 11px;
            margin-left: 8px;
        }

        .properties-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .property-card {
            background-color: #f0f0f5;
            padding: 10px;
            border-radius: 4px;
            border-left: 2px solid #3C3489;
        }

        .property-label {
            font-size: 10px;
            color: #666666;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .property-value {
            font-size: 12px;
            font-weight: 600;
            color: #1a1a2e;
            word-break: break-word;
        }

        .bars-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .bar-item {
            font-size: 12px;
        }

        .bar-label {
            margin-bottom: 6px;
            color: #666666;
            display: flex;
            justify-content: space-between;
        }

        .bar-label-name {
            font-weight: 500;
        }

        .bar-label-value {
            font-size: 11px;
            color: #999999;
        }

        .bar-container {
            height: 6px;
            background-color: #f0f0f5;
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3C3489, #534AB7);
            border-radius: 3px;
        }

        .process-flow {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 11px;
        }

        .process-step {
            background-color: #f0f0f5;
            padding: 6px 10px;
            border-radius: 3px;
            color: #1a1a2e;
            white-space: nowrap;
        }

        .process-arrow {
            color: #999999;
            font-weight: bold;
        }

        .carbon-gauge {
            background-color: #f0f0f5;
            padding: 12px;
            border-radius: 4px;
        }

        .carbon-value {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .carbon-bar {
            height: 8px;
            background-color: #f5f5f8;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .carbon-fill {
            height: 100%;
            background-color: #4ade80;
            border-radius: 4px;
        }

        .carbon-label {
            font-size: 10px;
            color: #666666;
        }

        .applications-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 11px;
        }

        .app-chip {
            background-color: #f0f0f5;
            padding: 4px 8px;
            border-radius: 12px;
            color: #666666;
            border: 1px solid #e0e0e0;
        }

        .story-section {
            background-color: #f0f0f5;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.6;
            color: #444444;
            max-height: 400px;
            overflow-y: auto;
        }

        .story-content {
            white-space: pre-wrap;
        }

        /* CATEGORY COLORS */
        .ferrous { --color: #3C3489; }
        .heavy { --color: #D85A30; }
        .light { --color: #0F6E56; }
        .precious { --color: #EF9F27; }
        .rare { --color: #534AB7; }
        .ree { --color: #1A8A7A; }
        .metalloid { --color: #888780; }

        .metal-item.ferrous { border-left-color: #3C3489; }
        .metal-item.heavy { border-left-color: #D85A30; }
        .metal-item.light { border-left-color: #0F6E56; }
        .metal-item.precious { border-left-color: #EF9F27; }
        .metal-item.rare { border-left-color: #534AB7; }
        .metal-item.ree { border-left-color: #1A8A7A; }
        .metal-item.metalloid { border-left-color: #888780; }

        .property-card.ferrous { border-left-color: #3C3489; }
        .property-card.heavy { border-left-color: #D85A30; }
        .property-card.light { border-left-color: #0F6E56; }
        .property-card.precious { border-left-color: #EF9F27; }
        .property-card.rare { border-left-color: #534AB7; }
        .property-card.ree { border-left-color: #1A8A7A; }
        .property-card.metalloid { border-left-color: #888780; }

        .bar-fill.ferrous { background: linear-gradient(90deg, #3C3489, #5a4dbd); }
        .bar-fill.heavy { background: linear-gradient(90deg, #D85A30, #ff7a51); }
        .bar-fill.light { background: linear-gradient(90deg, #0F6E56, #1a9a7a); }
        .bar-fill.precious { background: linear-gradient(90deg, #EF9F27, #ffc451); }
        .bar-fill.rare { background: linear-gradient(90deg, #534AB7, #7865d9); }
        .bar-fill.ree { background: linear-gradient(90deg, #1A8A7A, #2bb89a); }
        .bar-fill.metalloid { background: linear-gradient(90deg, #888780, #aaa89a); }

        /* Scrollbar styling */
        .sidebar-content::-webkit-scrollbar,
        .info-panel::-webkit-scrollbar,
        .story-section::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-content::-webkit-scrollbar-track,
        .info-panel::-webkit-scrollbar-track,
        .story-section::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-content::-webkit-scrollbar-thumb,
        .info-panel::-webkit-scrollbar-thumb,
        .story-section::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .sidebar-content::-webkit-scrollbar-thumb:hover,
        .info-panel::-webkit-scrollbar-thumb:hover,
        .story-section::-webkit-scrollbar-thumb:hover {
            background: #aaa;
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 6px 10px;
            border-radius: 3px;
            font-size: 11px;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
            border: 1px solid #ddd;
        }

        .hidden {
            display: none !important;
        }

        /* Pulse animation for points */
        @keyframes pulse {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
            100% {
                opacity: 1;
            }
        }

        .pulsing-point {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">금속 백과사전</div>
                <input type="text" class="search-input" id="searchInput" placeholder="금속 검색...">
            </div>
            <div class="sidebar-content" id="sidebarContent">
                <!-- Accordion groups will be populated here -->
            </div>
        </div>

        <!-- GLOBE -->
        <div class="globe-container">
            <div id="globeViz"></div>
            <div class="globe-info">
                <div>마우스: 회전 | 스크롤: 줌</div>
                <div style="margin-top: 4px; color: #999;">금속을 선택하면 산지가 표시됩니다</div>
            </div>
        </div>

        <!-- INFO PANEL -->
        <div class="info-panel" id="infoPanel">
            <div class="panel-header">
                <div class="panel-title">
                    <div class="metal-title-ko" id="panelMetalNameKo"></div>
                    <div class="metal-title-en" id="panelMetalNameEn"></div>
                    <div class="metal-category-tag" id="panelMetalCategory"></div>
                </div>
                <div class="metal-symbol-large" id="panelMetalSymbol"></div>
                <button class="panel-close-btn" id="panelCloseBtn">✕</button>
            </div>
            <div class="panel-content">
                <!-- Ore Information -->
                <div class="section">
                    <div class="section-title">원석 정보</div>
                    <div class="ore-info">
                        <div class="ore-name" id="oreNameKo"></div>
                        <div class="ore-type" id="oreType"></div>
                    </div>
                </div>

                <!-- Mining Locations -->
                <div class="section">
                    <div class="section-title">산지 정보 (주요 생산국)</div>
                    <div class="locations-list" id="locationsList"></div>
                </div>

                <!-- Properties -->
                <div class="section">
                    <div class="section-title">물질 특성</div>
                    <div class="properties-grid" id="propertiesGrid"></div>
                </div>

                <!-- Comparative Bars -->
                <div class="section">
                    <div class="section-title">상대 비교</div>
                    <div class="bars-grid" id="barsGrid"></div>
                </div>

                <!-- Processing -->
                <div class="section">
                    <div class="section-title">가공 프로세스</div>
                    <div class="process-flow" id="processList"></div>
                </div>

                <!-- Environmental -->
                <div class="section">
                    <div class="section-title">환경 정보 (탄소발자국)</div>
                    <div class="carbon-gauge" id="carbonGauge"></div>
                </div>

                <!-- Applications -->
                <div class="section">
                    <div class="section-title">활용 정보</div>
                    <div class="applications-chips" id="appsList"></div>
                </div>

                <!-- Story -->
                <div class="section">
                    <div class="section-title">스토리</div>
                    <div class="story-section" id="storySection">
                        <div class="story-content">스토리 로딩 중...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
    <script src="stories.js"></script>

        // GLOBE SETUP
        let globe, selectedMetal = null;

        function initGlobe() {
            const container = document.getElementById('globeViz');

            globe = Globe()(container)
                .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
                .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
                .backgroundColor('#f5f5f8')
                .showAtmosphere(true)
                .atmosphereColor('#87ceeb')
                .atmosphereAltitude(0.25)
                .pointsData([])
                .pointLat('lat')
                .pointLng('lng')
                .pointColor('color')
                .pointAltitude(0.06)
                .pointRadius(0.4)
                .pointLabel(d => {
                    const typeIcon = d.type === 'mine' ? '⛏️' : d.type === 'smelter' ? '🏭' : '🧪';
                    const typeName = d.type === 'mine' ? '광산' : d.type === 'smelter' ? '제련소' : '정제소';
                    return `<div style="background:rgba(255,255,255,0.95);padding:8px 12px;border-radius:6px;border:1px solid #ddd;font-size:12px;color:#333;font-family:-apple-system,sans-serif;">
                    <div style="font-weight:700;">${typeIcon} ${d.name}</div>
                    <div style="color:#666;font-size:11px;">${d.country} · ${d.pct}% · ${typeName}</div>
                </div>`;
                })
                .htmlElementsData([])
                .htmlLat('lat')
                .htmlLng('lng')
                .htmlAltitude(0.02)
                .htmlElement(d => {
                    const el = document.createElement('div');
                    const typeIcon = d.type === 'mine' ? '⛏️' : d.type === 'smelter' ? '🏭' : '🧪';
                    el.style.cssText = 'color:' + d.color + ';font-size:12px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,sans-serif;text-shadow:0 0 6px rgba(255,255,255,0.9),0 0 3px rgba(255,255,255,0.7);white-space:nowrap;pointer-events:none;transform:translate(-50%,-100%);padding:2px 6px;background:rgba(255,255,255,0.7);border-radius:3px;';
                    el.textContent = `${typeIcon} ${d.name}`;
                    return el;
                });

            // Set initial view point (shows Asia/Europe)
            globe.pointOfView({ lat: 30, lng: 50, altitude: 2.2 });

            // Handle resize
            window.addEventListener('resize', () => {
                globe.width(container.clientWidth);
                globe.height(container.clientHeight);
            });
        }

        function addMinePins(locations, categoryColor) {
            const pointsData = locations.map(loc => {
                let radius = 0.4;
                let altitude = 0.06;
                if (loc.type === 'mine') {
                    radius = 0.5;
                    altitude = 0.04;
                } else if (loc.type === 'smelter') {
                    radius = 0.35;
                    altitude = 0.07;
                } else if (loc.type === 'refinery') {
                    radius = 0.25;
                    altitude = 0.10;
                }
                return {
                    lat: loc.lat,
                    lng: loc.lng,
                    name: loc.name,
                    country: loc.country,
                    pct: loc.pct,
                    type: loc.type,
                    color: categoryColor,
                    radius: radius,
                    altitude: altitude
                };
            });

            const htmlData = locations.map(loc => {
                const typeIcon = loc.type === 'mine' ? '⛏️' : loc.type === 'smelter' ? '🏭' : '🧪';
                return {
                    lat: loc.lat,
                    lng: loc.lng,
                    name: `${typeIcon} ${loc.name}`,
                    color: categoryColor,
                    type: loc.type
                };
            });

            globe
                .pointsData(pointsData)
                .pointRadius(d => d.radius)
                .pointAltitude(d => d.altitude);

            globe.htmlElementsData(htmlData);

            // Animate to first location
            if (locations.length > 0) {
                globe.pointOfView({ lat: locations[0].lat, lng: locations[0].lng, altitude: 2.0 }, 1000);
            }
        }


        // UI FUNCTIONS
        function buildSidebar() {
            const sidebarContent = document.getElementById('sidebarContent');
            sidebarContent.innerHTML = '';

            const categoryOrder = ['ferrous', 'heavy', 'light', 'precious', 'rare', 'ree', 'metalloid'];

            categoryOrder.forEach(catId => {
                const metals = METALS_DATA.filter(m => m.category === catId);
                if (metals.length === 0) return;

                const group = document.createElement('div');
                group.className = 'accordion-group';

                const header = document.createElement('div');
                header.className = 'accordion-header active';
                header.innerHTML = `<span class="accordion-arrow">▶</span> ${CATEGORY_NAMES[catId]}`;

                const content = document.createElement('div');
                content.className = 'accordion-content active';

                metals.forEach(metal => {
                    const item = document.createElement('button');
                    item.className = `metal-item ${metal.category}`;
                    item.dataset.metalId = metal.id;
                    item.innerHTML = `
                        <div class="metal-symbol">${metal.symbol}</div>
                        <div class="metal-names">
                            <div class="metal-name-ko">${metal.name}</div>
                            <div class="metal-name-en">${metal.nameEn}</div>
                        </div>
                    `;
                    item.addEventListener('click', () => selectMetal(metal));
                    content.appendChild(item);
                });

                header.addEventListener('click', () => {
                    header.classList.toggle('active');
                    content.classList.toggle('active');
                    header.querySelector('.accordion-arrow').style.transform =
                        header.classList.contains('active') ? 'rotate(90deg)' : 'rotate(0deg)';
                });

                group.appendChild(header);
                group.appendChild(content);
                sidebarContent.appendChild(group);
            });
        }

        function selectMetal(metal) {
            selectedMetal = metal;

            // Update sidebar selection
            document.querySelectorAll('.metal-item').forEach(item => {
                item.classList.remove('selected');
            });
            document.querySelector(`[data-metal-id="${metal.id}"]`).classList.add('selected');

            // Show panel
            const panel = document.getElementById('infoPanel');
            panel.className = 'info-panel open ' + metal.category;

            // Resize globe after panel animation
            setTimeout(() => {
                const container = document.getElementById('globeViz');
                globe.width(container.clientWidth);
                globe.height(container.clientHeight);
            }, 350);

            // Update panel header
            document.getElementById('panelMetalNameKo').textContent = metal.name;
            document.getElementById('panelMetalNameEn').textContent = metal.nameEn;
            document.getElementById('panelMetalSymbol').textContent = metal.symbol;
            document.getElementById('panelMetalCategory').textContent = CATEGORY_NAMES[metal.category];

            // Ore info
            document.getElementById('oreNameKo').textContent = metal.ore.name;
            document.getElementById('oreType').textContent = metal.ore.type;

            // Locations
            const locationsList = document.getElementById('locationsList');
            locationsList.innerHTML = metal.locations.map(loc => `
                <div class="location-item">
                    <div>
                        <div class="location-name">${loc.name}</div>
                        <div class="location-country">${loc.country}</div>
                    </div>
                    <div class="location-pct">${loc.pct}%</div>
                </div>
            `).join('');

            // Properties
            const propertiesGrid = document.getElementById('propertiesGrid');
            const props = [
                { label: '밀도', value: metal.properties.density },
                { label: '용융점', value: metal.properties.meltingPoint },
                { label: '인장강도', value: metal.properties.tensileStrength },
                { label: '전도율', value: metal.properties.conductivity },
                { label: '경도', value: metal.properties.hardness },
                { label: '결정구조', value: metal.properties.crystalStructure }
            ];
            propertiesGrid.innerHTML = props.map(p => `
                <div class="property-card ${metal.category}">
                    <div class="property-label">${p.label}</div>
                    <div class="property-value">${p.value}</div>
                </div>
            `).join('');

            // Comparative bars
            const barsGrid = document.getElementById('barsGrid');
            const barLabels = ['강도', '내식성', '전도성', '경량성', '내열성'];
            const barKeys = ['strength', 'corrosionRes', 'conductivity', 'lightweight', 'heatRes'];
            barsGrid.innerHTML = barLabels.map((label, idx) => {
                const value = metal.bars[barKeys[idx]];
                return `
                    <div class="bar-item">
                        <div class="bar-label">
                            <span class="bar-label-name">${label}</span>
                            <span class="bar-label-value">${value}</span>
                        </div>
                        <div class="bar-container">
                            <div class="bar-fill ${metal.category}" style="width: ${value}%"></div>
                        </div>
                    </div>
                `;
            }).join('');

            // Process
            const processList = document.getElementById('processList');
            processList.innerHTML = metal.process.map((step, idx) => `
                <div class="process-step">${step}</div>
                ${idx < metal.process.length - 1 ? '<div class="process-arrow">→</div>' : ''}
            `).join('');

            // Carbon
            const carbonGauge = document.getElementById('carbonGauge');
            let carbonColor = '#4ade80';
            if (metal.carbon > 5) carbonColor = '#fbbf24';
            if (metal.carbon > 20) carbonColor = '#f87171';
            const carbonPercent = Math.min(100, (metal.carbon / 50) * 100);
            carbonGauge.innerHTML = `
                <div class="carbon-value">${metal.carbon} kg CO₂/kg</div>
                <div class="carbon-bar">
                    <div class="carbon-fill" style="width: ${carbonPercent}%; background-color: ${carbonColor};"></div>
                </div>
                <div class="carbon-label">${metal.carbon > 20 ? '높음' : metal.carbon > 5 ? '중간' : '낮음'}</div>
            `;

            // Applications
            const appsList = document.getElementById('appsList');
            appsList.innerHTML = metal.applications.map(app => `
                <div class="app-chip">${app}</div>
            `).join('');

            // Story
            const storySection = document.getElementById('storySection');
            if (typeof METAL_STORIES !== 'undefined' && METAL_STORIES[metal.id]) {
                storySection.innerHTML = METAL_STORIES[metal.id].map(story => `
                    <div class="story-card" style="background:#252540;padding:14px;border-radius:6px;margin-bottom:10px;border-left:3px solid var(--color, #534AB7);">
                        <div style="font-weight:700;color:#fff;margin-bottom:8px;font-size:13px;">${story.title}</div>
                        <div style="font-size:12px;color:#bbb;line-height:1.7;">${story.content}</div>
                    </div>
                `).join('');
            } else {
                storySection.innerHTML = '<div class="story-content" style="color:#666;font-size:12px;">이 금속의 스토리 콘텐츠를 준비 중입니다.</div>';
            }

            // Add mine pins to globe
            const categoryColors = {
                ferrous: '#3C3489', heavy: '#D85A30', light: '#0F6E56',
                precious: '#EF9F27', rare: '#534AB7', ree: '#1A8A7A', metalloid: '#888780'
            };
            addMinePins(metal.locations, categoryColors[metal.category] || '#ffffff');
        }

        function closePanel() {
            document.getElementById('infoPanel').classList.remove('open');
            document.querySelectorAll('.metal-item').forEach(item => {
                item.classList.remove('selected');
            });
            globe.pointsData([]);
            globe.htmlElementsData([]);

            // Resize globe after panel closes
            setTimeout(() => {
                const container = document.getElementById('globeViz');
                globe.width(container.clientWidth);
                globe.height(container.clientHeight);
            }, 350);

            selectedMetal = null;
        }

        function filterMetals(searchTerm) {
            const term = searchTerm.toLowerCase();
            document.querySelectorAll('.metal-item').forEach(item => {
                const metal = METALS_DATA.find(m => m.id === item.dataset.metalId);
                const matches = metal.name.includes(term) ||
                               metal.nameEn.toLowerCase().includes(term) ||
                               metal.symbol.toLowerCase().includes(term);
                item.style.display = matches ? 'flex' : 'none';
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initGlobe();
            buildSidebar();

            document.getElementById('searchInput').addEventListener('input', (e) => {
                filterMetals(e.target.value);
            });

            document.getElementById('panelCloseBtn').addEventListener('click', closePanel);
        });
    </script>
</body>
</html>
